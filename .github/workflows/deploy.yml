name: Deploy V3 themes

# Build each V3 theme, upload its bundle to R2 (shared by every env), and
# register it in BOTH the storefront registry (themes/theme_versions) and the
# marketplace catalog (marketplace_themes/versions) on the TEST environment
# (droplet) AND on PROD (AWS EC2).
#
# Registry/marketplace seeding runs the NUMU-api seed scripts inside the API
# container of each env, piping each theme's freshly-built dist in over SSH:
#   - TEST: `numu-api-test` container on the droplet (test DB).
#   - PROD: the `api` compose service in /opt/numu-api on the EC2 box
#           (Supabase prod DB). seed_marketplace_theme.py auto-resolves the
#           developer to the prod `admin@numueg.app` user, so the catalog rows
#           land on the right owner without a DEVELOPER_USER_ID override — this
#           replaces the manual test→prod DB copy we used to run by hand.
#
# Required secrets (reuses the same names the NUMU-api / numu-storefront CD
# workflows already use):
#   R2:   S3_ENDPOINT_URL S3_ACCESS_KEY_ID S3_SECRET_ACCESS_KEY
#         S3_BUCKET_NAME  S3_PUBLIC_URL    S3_REGION
#   TEST: STAGING_SSH_KEY  STAGING_HOST  STAGING_SSH_USER  (droplet, docker access)
#   PROD: PROD_EC2_SSH_KEY PROD_EC2_HOST PROD_EC2_USER     (EC2, docker access)

on:
  workflow_dispatch:
    inputs:
      theme:
        description: "Theme dir (e.g. luxury-minimal-engine-V3) or 'all'"
        required: false
        default: "all"
      version_bump:
        description: "Bump each theme's theme.json version before deploy so a NEW marketplace version appears. 'none' redeploys the current version in place."
        type: choice
        options:
          - patch
          - minor
          - major
          - none
        default: patch
      sdk_version:
        description: "Pin @numueg/theme-* deps to this version before building (e.g. 0.4.0). Blank = use each theme's pinned version."
        required: false
        default: ""
      commit_bumps:
        description: "Commit the package.json version bumps back to the repo (only with sdk_version)"
        type: boolean
        default: false
      strict:
        description: "Fail the whole run if any theme fails to build"
        type: boolean
        default: false
      seed_test:
        description: "Seed the TEST registry/marketplace (droplet numu-api-test)"
        type: boolean
        default: true
      seed_prod:
        description: "Seed the PROD registry/marketplace (EC2 Supabase). Pushes go live in the storefront."
        type: boolean
        default: true
  push:
    branches: [main]
    paths:
      - "*-engine-V3/**"

# Needed only for the optional `commit_bumps` push-back step.
permissions:
  contents: write

concurrency:
  group: deploy-v3-themes
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # v5/v6 majors run natively on the Node 24 runner (v4/v5 targeted the
      # now-deprecated Node 20 and spammed every run with a deprecation warning).
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install boto3
        run: pip install --quiet boto3

      # Bump each (selected) theme's theme.json version BEFORE building, so the
      # R2 bundle path and the marketplace seed land on a NEW version string —
      # otherwise the seed (idempotent by slug+version) just updates the current
      # version in place and nothing new shows up. The bump is committed back
      # below so versions stay monotonic across runs. Skipped on the push
      # trigger (inputs are empty there) and when version_bump = none.
      - name: Bump theme.json versions
        if: ${{ github.event.inputs.version_bump != '' && github.event.inputs.version_bump != 'none' }}
        env:
          BUMP: ${{ github.event.inputs.version_bump }}
          THEME_INPUT: ${{ github.event.inputs.theme }}
        run: |
          node - <<'NODE'
          const fs = require('fs'), path = require('path');
          const bump = process.env.BUMP || 'patch';
          const want = process.env.THEME_INPUT || 'all';
          const inc = (v) => {
            const p = String(v || '0.0.0').split('.').map((n) => parseInt(n, 10) || 0);
            while (p.length < 3) p.push(0);
            if (bump === 'major') { p[0]++; p[1] = 0; p[2] = 0; }
            else if (bump === 'minor') { p[1]++; p[2] = 0; }
            else { p[2]++; }
            return p.slice(0, 3).join('.');
          };
          let n = 0;
          for (const d of fs.readdirSync('.')) {
            if (!d.endsWith('-engine-V3')) continue;
            if (want !== 'all' && want !== d) continue;
            const tj = path.join(d, 'theme.json');
            if (!fs.existsSync(tj)) continue;
            const j = JSON.parse(fs.readFileSync(tj, 'utf8'));
            const old = j.version;
            j.version = inc(j.version);
            fs.writeFileSync(tj, JSON.stringify(j, null, 2) + '\n');
            console.log(`bumped ${d}: ${old} -> ${j.version}`);
            n++;
          }
          console.log(`Bumped ${n} theme(s) (${bump}).`);
          NODE

      # When an sdk_version is passed, rewrite every theme's @numueg/theme-*
      # dependency (deps/devDeps/peerDeps) to that version BEFORE install — a
      # `^0.4.0` pin will never resolve a freshly-published 0.5.0 on its own.
      - name: Pin @numueg/theme-* deps to sdk_version
        if: ${{ github.event.inputs.sdk_version != '' }}
        env:
          SDK_VERSION: ${{ github.event.inputs.sdk_version }}
        run: |
          node - <<'NODE'
          const fs = require('fs'), path = require('path');
          const ver = process.env.SDK_VERSION.replace(/^[\^~]/, '');
          const range = '^' + ver;
          let changed = 0;
          for (const d of fs.readdirSync('.')) {
            if (!d.endsWith('-engine-V3')) continue;
            const pj = path.join(d, 'package.json');
            if (!fs.existsSync(pj)) continue;
            const j = JSON.parse(fs.readFileSync(pj, 'utf8'));
            let touched = false;
            for (const k of ['dependencies', 'devDependencies', 'peerDependencies']) {
              if (!j[k]) continue;
              for (const name of Object.keys(j[k])) {
                if (/^@numueg\/theme-/.test(name) && j[k][name] !== range) {
                  j[k][name] = range; touched = true;
                }
              }
            }
            if (touched) {
              fs.writeFileSync(pj, JSON.stringify(j, null, 2) + '\n');
              changed++; console.log('pinned ' + d + ' -> @numueg/theme-* ' + range);
            }
          }
          console.log('Updated ' + changed + ' theme(s) to ' + range);
          NODE

      - name: Write R2 creds + SSH key
        env:
          R2_ENDPOINT: ${{ secrets.S3_ENDPOINT_URL }}
          R2_KEY: ${{ secrets.S3_ACCESS_KEY_ID }}
          R2_SECRET: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.S3_BUCKET_NAME }}
          R2_PUBLIC: ${{ secrets.S3_PUBLIC_URL }}
          R2_REGION: ${{ secrets.S3_REGION }}
          SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          EC2_KEY: ${{ secrets.PROD_EC2_SSH_KEY }}
        run: |
          umask 077
          cat > "$RUNNER_TEMP/r2.env" <<EOF
          S3_ENDPOINT_URL=$R2_ENDPOINT
          S3_ACCESS_KEY_ID=$R2_KEY
          S3_SECRET_ACCESS_KEY=$R2_SECRET
          S3_BUCKET_NAME=$R2_BUCKET
          S3_PUBLIC_URL=$R2_PUBLIC
          S3_REGION=$R2_REGION
          EOF
          printf '%s\n' "$SSH_KEY" > "$RUNNER_TEMP/ssh_key"
          chmod 600 "$RUNNER_TEMP/ssh_key"
          printf '%s\n' "$EC2_KEY" > "$RUNNER_TEMP/ec2_key"
          chmod 600 "$RUNNER_TEMP/ec2_key"

      - name: Build, deploy to R2, seed registry + marketplace
        env:
          NUMU_R2_ENV: ${{ runner.temp }}/r2.env
          BUNDLE_BASE: ${{ secrets.S3_PUBLIC_URL }}
          DROPLET: ${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_HOST }}
          EC2: ${{ secrets.PROD_EC2_USER }}@${{ secrets.PROD_EC2_HOST }}
          THEME_INPUT: ${{ github.event.inputs.theme }}
          STRICT: ${{ github.event.inputs.strict }}
          # Empty (push trigger) → seed both. Only an explicit 'false' opts out.
          SEED_TEST: ${{ github.event.inputs.seed_test != 'false' }}
          SEED_PROD: ${{ github.event.inputs.seed_prod != 'false' }}
          CONTAINER: numu-api-test
          # PROD api lives as the `api` compose service in /opt/numu-api on EC2.
          EC2_DIR: /opt/numu-api
        run: |
          set -u
          SSH="ssh -i $RUNNER_TEMP/ssh_key -o StrictHostKeyChecking=no -o ConnectTimeout=20"
          SSH_EC2="ssh -i $RUNNER_TEMP/ec2_key -o StrictHostKeyChecking=no -o ConnectTimeout=20"
          WANT="${THEME_INPUT:-all}"
          # Deferred/stub themes that intentionally do not build yet. They are
          # skipped on 'all' runs so every push isn't annotated with a phantom
          # failure; deploying one explicitly (theme=<dir>) still works and will
          # surface its real build error. Remove an entry when its rebuild lands.
          SKIP="street-engine-V3"
          ok=0; fail=0; failed=""
          for d in *-engine-V3/; do
            d="${d%/}"
            if [ "$WANT" != "all" ] && [ "$WANT" != "$d" ]; then continue; fi
            if [ "$WANT" = "all" ] && printf '%s\n' $SKIP | grep -qx "$d"; then
              echo "skipping $d (deferred stub — see SKIP list in deploy.yml)"; continue
            fi
            echo "::group::$d"
            # Themes build with `vite build` (the @numueg/theme-plugin federation
            # plugin emits the full dist: theme.js/json, sections.json,
            # settings_schema.json, theme.css, import-map.json). Do NOT use
            # `npx numu-theme` here — `numu-theme` is the BIN of @numueg/theme-cli
            # which isn't a theme dependency, so on a clean runner npx tries to
            # fetch a non-existent `numu-theme` package and 404s.
            if ! ( cd "$d" && npm install --no-audit --no-fund && npm run build ); then
              echo "::error::build failed for $d"; failed="$failed $d"; fail=$((fail+1)); echo "::endgroup::"; continue
            fi
            if [ ! -f "$d/theme.json" ] || [ ! -f "$d/dist/theme.js" ]; then
              echo "::error::missing theme.json or dist/theme.js for $d"; failed="$failed $d"; fail=$((fail+1)); echo "::endgroup::"; continue
            fi
            SLUG=$(node -e "console.log(require('./$d/theme.json').id)")
            VER=$(node -e "console.log(require('./$d/theme.json').version)")
            echo "deploying $SLUG@$VER"
            python _deploy-bundle-r2.py "$SLUG" "$VER" "$d/dist"
            # Pipe dist into each env's api container, then seed both registries
            # there. Under the droplet's memory pressure the test container can
            # be OOM-killed mid-run, which previously aborted the WHOLE deploy
            # with "container is not running" (the runner shell is `bash -eo
            # pipefail`, so a failed `docker exec` exits the step). Make it
            # resilient: ensure the container is up first (start is a no-op when
            # already running), retry once, and on a hard failure count the
            # theme + continue so later themes still deploy.
            #
            # TEST = `docker exec` against the named `numu-api-test` container on
            # the droplet. PROD = `docker compose exec` against the `api` service
            # in /opt/numu-api on EC2 (no fixed container name; compose resolves
            # it). Both seed scripts read THEME_DIR + THEME_BUNDLE_BASE; the
            # marketplace script auto-resolves the developer to each env's
            # admin@numueg.app user.
            seed_theme() {
              $SSH "$DROPLET" "docker start $CONTAINER >/dev/null 2>&1 || true"
              tar -C "$d/dist" -cf - . | $SSH "$DROPLET" \
                "docker exec -i $CONTAINER sh -c 'rm -rf /tmp/seed-dist && mkdir -p /tmp/seed-dist && tar -C /tmp/seed-dist -xf -'" \
                && $SSH "$DROPLET" "docker exec -e THEME_DIR=/tmp/seed-dist -e THEME_BUNDLE_BASE=$BUNDLE_BASE $CONTAINER python scripts/seed_numu_theme.py" \
                && $SSH "$DROPLET" "docker exec -e THEME_DIR=/tmp/seed-dist -e THEME_BUNDLE_BASE=$BUNDLE_BASE $CONTAINER python scripts/seed_marketplace_theme.py"
            }
            seed_theme_ec2() {
              $SSH_EC2 "$EC2" "cd $EC2_DIR && docker compose start api >/dev/null 2>&1 || true"
              tar -C "$d/dist" -cf - . | $SSH_EC2 "$EC2" \
                "cd $EC2_DIR && docker compose exec -T api sh -c 'rm -rf /tmp/seed-dist && mkdir -p /tmp/seed-dist && tar -C /tmp/seed-dist -xf -'" \
                && $SSH_EC2 "$EC2" "cd $EC2_DIR && docker compose exec -T -e THEME_DIR=/tmp/seed-dist -e THEME_BUNDLE_BASE=$BUNDLE_BASE api python scripts/seed_numu_theme.py" \
                && $SSH_EC2 "$EC2" "cd $EC2_DIR && docker compose exec -T -e THEME_DIR=/tmp/seed-dist -e THEME_BUNDLE_BASE=$BUNDLE_BASE api python scripts/seed_marketplace_theme.py"
            }

            theme_failed=0

            if [ "$SEED_TEST" = "true" ]; then
              if ! seed_theme; then
                echo "::warning::test seed failed for $d; ensuring $CONTAINER is up and retrying once"
                $SSH "$DROPLET" "docker start $CONTAINER >/dev/null 2>&1 || true; sleep 8"
                if ! seed_theme; then
                  echo "::error::test seed failed for $d (api container kept stopping — check droplet memory/swap)"
                  theme_failed=1
                fi
              fi
            else
              echo "seed_test=false — skipping TEST seed for $d"
            fi

            if [ "$SEED_PROD" = "true" ]; then
              if ! seed_theme_ec2; then
                echo "::warning::prod (EC2) seed failed for $d; ensuring api is up and retrying once"
                $SSH_EC2 "$EC2" "cd $EC2_DIR && docker compose start api >/dev/null 2>&1 || true; sleep 8"
                if ! seed_theme_ec2; then
                  echo "::error::prod seed failed for $d (check EC2 api container / Supabase reachability)"
                  theme_failed=1
                fi
              fi
            else
              echo "seed_prod=false — skipping PROD seed for $d"
            fi

            if [ "$theme_failed" = "1" ]; then
              failed="$failed $d"; fail=$((fail+1)); echo "::endgroup::"; continue
            fi
            ok=$((ok+1))
            echo "::endgroup::"
          done
          echo "Deployed $ok theme(s); $fail failed.$failed"
          if [ "$STRICT" = "true" ] && [ "$fail" -gt 0 ]; then
            echo "::error::strict mode: $fail theme(s) failed"; exit 1
          fi

      # Persist the bumps back to the repo so the next run starts from the new
      # version (monotonic marketplace versions) and the committed SDK pins
      # match what was deployed. `[skip ci]` keeps the push-trigger from
      # re-running us. Runs when we bumped theme.json (version_bump) or when an
      # sdk_version pin was requested with commit_bumps.
      - name: Commit version bumps
        if: ${{ (github.event.inputs.version_bump != '' && github.event.inputs.version_bump != 'none') || (github.event.inputs.sdk_version != '' && github.event.inputs.commit_bumps == 'true') }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ./*-engine-V3/theme.json ./*-engine-V3/package.json
          if git diff --cached --quiet; then
            echo "no version changes to commit"
          else
            git commit -m "chore(themes): version bump from deploy run [skip ci]"
            # Two dispatched runs can race on this push (the second checked out
            # main before the first pushed its bump). Rebase-and-retry so the
            # bump always lands instead of failing the whole run.
            for attempt in 1 2 3; do
              if git push; then break; fi
              echo "push rejected (attempt $attempt) — rebasing onto latest main"
              git pull --rebase origin main
            done
          fi
