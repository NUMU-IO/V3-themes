<!-- Static BYOT error template — Luxury Minimal -->
<main role="alert" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;background:#ffffff;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif">
  <div style="text-align:center;max-width:28rem">
    <p style="font-size:.625rem;letter-spacing:.3em;text-transform:uppercase;color:#757575;margin:0 0 1rem">Something went wrong</p>
    <h1 style="font-size:1.5rem;font-weight:400;letter-spacing:.12em;text-transform:uppercase;color:#1a1a1a;margin:0">Please try again</h1>
    <p style="color:#757575;margin-top:.75rem;font-size:.875rem">We hit a snag loading this page.</p>
    <button data-numu-reset type="button" style="margin-top:1.75rem;padding:1rem 2.5rem;background:#1a1a1a;color:#fff;border:1px solid #1a1a1a;font-size:.7rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;cursor:pointer">Try again</button>
  </div>
</main>
