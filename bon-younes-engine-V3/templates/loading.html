<!-- Static BYOT loading skeleton -->
<div role="status" aria-live="polite" aria-label="Loading" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;background:#f7f1e8;font-family:'DM Sans',system-ui,sans-serif">
  <div style="display:flex;flex-direction:column;align-items:center;gap:1rem">
    <div style="width:42px;height:42px;border-radius:50%;border:3px solid #d8c4a8;border-top-color:#3a2418;animation:by-spin .8s linear infinite"></div>
    <span style="font-size:.875rem;font-weight:500;color:#6b4a36;letter-spacing:.06em">Brewing your store…</span>
  </div>
  <style>@keyframes by-spin{to{transform:rotate(360deg)}}</style>
</div>
