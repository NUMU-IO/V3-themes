<!-- Static BYOT error template -->
<main role="alert" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;font-family:'Cormorant Garamond',serif;background:#f7f1e8;color:#3a2418">
  <div style="text-align:center;max-width:28rem">
    <h1 style="font-size:1.75rem;font-weight:600;letter-spacing:.02em">Something brewed wrong</h1>
    <p style="color:#6b4a36;margin-top:.5rem;font-family:'DM Sans',system-ui,sans-serif;font-size:.95rem">Please try again in a moment.</p>
    <button data-numu-reset type="button" style="margin-top:1.5rem;padding:.6rem 1.4rem;background:#3a2418;color:#f7f1e8;border-radius:9999px;border:0;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;letter-spacing:.04em">Try again</button>
  </div>
</main>
